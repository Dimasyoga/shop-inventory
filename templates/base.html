<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}Shop Inventory{% endblock %}</title>
    <link rel="stylesheet" href="/static/css/style.css">
</head>
<body>
    {% if 'user_id' in session %}
    <nav class="sidebar">
        <div class="sidebar-header">
            <h1>📦 Shop Inventory</h1>
        </div>
        <ul class="nav-links">
            <li><a href="{{ url_for('dashboard') }}" class="{% if request.endpoint == 'dashboard' %}active{% endif %}">📊 Dashboard</a></li>
            <li><a href="{{ url_for('products_page') }}" class="{% if request.endpoint == 'products_page' %}active{% endif %}">📦 Products</a></li>
            <li><a href="{{ url_for('categories_page') }}" class="{% if request.endpoint == 'categories_page' %}active{% endif %}">🏷️ Categories</a></li>
            <li><a href="{{ url_for('orders_page') }}" class="{% if request.endpoint == 'orders_page' %}active{% endif %}">🛒 Orders</a></li>
            <li><a href="{{ url_for('restock_page') }}" class="{% if request.endpoint == 'restock_page' %}active{% endif %}">📥 Restock</a></li>
            <li><a href="{{ url_for('sales_page') }}" class="{% if request.endpoint == 'sales_page' %}active{% endif %}">📈 Sales</a></li>
            <li><a href="{{ url_for('settings_page') }}" class="{% if request.endpoint == 'settings_page' %}active{% endif %}">⚙️ Settings</a></li>
        </ul>
        <div class="sidebar-footer">
            <span>👤 {{ session.get('username', '') }}</span>
            <a href="{{ url_for('logout') }}">Logout</a>
        </div>
    </nav>
    <main class="content">
        {% block content %}{% endblock %}
    </main>
    {% endif %}
    <script src="/static/js/app.js"></script>
</body>
</html>
