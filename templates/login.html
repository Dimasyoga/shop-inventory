<!DOCTYPE html>
<html lang="{{ lang }}">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{{ t('Login') }} - {{ t('Shop Inventory') }}</title>
    <link rel="stylesheet" href="/static/css/style.css">
    <style>
        .login-container {
            display: flex; justify-content: center; align-items: center;
            min-height: 100vh; background: #f0f2f5;
        }
        .login-box {
            background: white; padding: 40px; border-radius: 12px;
            box-shadow: 0 2px 16px rgba(0,0,0,0.1); width: 360px;
        }
        .login-box h1 { text-align: center; margin-bottom: 8px; color: #1a1a2e; }
        .login-box p { text-align: center; color: #666; margin-bottom: 24px; }
        .form-group { margin-bottom: 16px; }
        .form-group label { display: block; margin-bottom: 4px; font-weight: 600; color: #333; }
        .form-group input {
            width: 100%; padding: 10px 12px; border: 1px solid #ddd;
            border-radius: 6px; font-size: 14px; box-sizing: border-box;
        }
        .btn-login {
            width: 100%; padding: 12px; background: #4361ee; color: white;
            border: none; border-radius: 6px; font-size: 16px; cursor: pointer;
        }
        .btn-login:hover { background: #3a56d4; }
        .error-msg {
            background: #ffe0e0; color: #d32f2f; padding: 8px 12px;
            border-radius: 6px; margin-bottom: 16px; font-size: 14px;
        }
    </style>
</head>
<body>
    <div class="login-container">
        <div class="login-box">
            <h1>📦 {{ t('Shop Inventory') }}</h1>
            <p>{{ t('Sign in to manage your shop') }}</p>
            {% if error %}
            <div class="error-msg">{{ error }}</div>
            {% endif %}
            <form method="POST" action="{{ url_for('login') }}">
                <div class="form-group">
                    <label>{{ t('Username') }}</label>
                    <input type="text" name="username" required autofocus>
                </div>
                <div class="form-group">
                    <label>{{ t('Password') }}</label>
                    <input type="password" name="password" required>
                </div>
                <button type="submit" class="btn-login">{{ t('Sign In') }}</button>
            </form>
        </div>
    </div>
</body>
</html>
