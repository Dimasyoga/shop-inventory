{% extends "base.html" %}
{% block title %}Products{% endblock %}
{% block content %}
<div class="page-header">
    <h2>Products</h2>
    <button class="btn btn-primary" onclick="openProductModal()">+ Add Product</button>
</div>

<div class="card">
    <div class="table-controls">
        <input type="text" id="searchProduct" class="search-input" placeholder="Search products..." oninput="loadProducts()">
        <select id="filterCategory" onchange="loadProducts()">
            <option value="">All Categories</option>
            {% for c in categories %}
            <option value="{{ c['id'] }}">{{ c['name'] }}</option>
            {% endfor %}
        </select>
    </div>
    <table class="data-table" id="productsTable">
        <thead>
            <tr><th>SKU</th><th>Name</th><th>Category</th><th>Price</th><th>Stock</th><th>Actions</th></tr>
        </thead>
        <tbody id="productsBody">
        </tbody>
    </table>
</div>

<!-- Product Modal -->
<div class="modal" id="productModal">
    <div class="modal-content">
        <div class="modal-header">
            <h3 id="modalTitle">Add Product</h3>
            <span class="modal-close" onclick="closeProductModal()">&times;</span>
        </div>
        <form id="productForm" onsubmit="saveProduct(event)">
            <input type="hidden" id="productId">
            <div class="form-group">
                <label>Name *</label>
                <input type="text" id="productName" required>
            </div>
            <div class="form-group">
                <label>SKU</label>
                <input type="text" id="productSku">
            </div>
            <div class="form-group">
                <label>Category</label>
                <select id="productCategory">
                    <option value="">None</option>
                    {% for c in categories %}
                    <option value="{{ c['id'] }}">{{ c['name'] }}</option>
                    {% endfor %}
                </select>
            </div>
            <div class="form-row">
                <div class="form-group">
                    <label>Price (Rp) *</label>
                    <input type="number" id="productPrice" required min="0" step="1">
                </div>
                <div class="form-group">
                    <label>Stock Qty</label>
                    <input type="number" id="productStock" min="0" value="0">
                </div>
                <div class="form-group">
                    <label>Reorder Threshold</label>
                    <input type="number" id="productThreshold" min="0" value="0">
                </div>
            </div>
            <div class="modal-actions">
                <button type="button" class="btn btn-secondary" onclick="closeProductModal()">Cancel</button>
                <button type="submit" class="btn btn-primary">Save</button>
            </div>
        </form>
    </div>
</div>

<!-- Stock Adjustment Modal -->
<div class="modal" id="stockModal">
    <div class="modal-content" style="max-width: 400px">
        <div class="modal-header">
            <h3>Adjust Stock</h3>
            <span class="modal-close" onclick="closeStockModal()">&times;</span>
        </div>
        <form onsubmit="adjustStock(event)">
            <input type="hidden" id="stockProductId">
            <p id="stockProductName" style="margin-bottom:16px;font-weight:600"></p>
            <div class="form-group">
                <label>Quantity Change (+in / -out)</label>
                <input type="number" id="stockChangeQty" required>
            </div>
            <div class="form-group">
                <label>Reason</label>
                <input type="text" id="stockReason" placeholder="e.g. Restock, Damage">
            </div>
            <div class="modal-actions">
                <button type="button" class="btn btn-secondary" onclick="closeStockModal()">Cancel</button>
                <button type="submit" class="btn btn-primary">Apply</button>
            </div>
        </form>
    </div>
</div>
{% endblock %}
